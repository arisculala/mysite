version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysite-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mysite-network

  nginx:
    image: nginx:1.27-alpine
    container_name: mysite-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL certificates (e.g. from Certbot):
      # - ./ssl:/etc/nginx/ssl:ro
      # - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mysite-network

networks:
  mysite-network:
    driver: bridge
